<!DOCTYPE html>
<html>
<head>
    <title>Tugas 3 Muhammad Difa A</title>
</head>
<body>

<h2>1. Persegi Panjang</h2>
<svg width="300" height="150">
    <rect x="20" y="20" width="200" height="100"
        fill="blue"
        fill-opacity="0.7"
        stroke="red"
        stroke-width="5"
        stroke-dasharray="10,5" />
</svg>

<h2>2. Lingkaran dengan Gradien dan Teks</h2>
<svg width="300" height="200">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="yellow" />
            <stop offset="100%" stop-color="red" />
        </linearGradient>
    </defs>

    <circle cx="150" cy="100" r="70" fill="url(#grad1)" />
    
    <text x="150" y="110" font-size="30" text-anchor="middle" fill="white">
        SVG
    </text>
</svg>

<h2>3. Persegi dengan Drop Shadow</h2>
<svg width="300" height="200">
    <defs>
        <filter id="shadow">
            <feDropShadow dx="5" dy="5" stdDeviation="4" flood-opacity="0.6"/>
        </filter>
    </defs>

    <rect x="60" y="40" width="150" height="150"
        fill="green"
        stroke="black"
        stroke-width="3"
        filter="url(#shadow)" />
</svg>

</body>
</html>
